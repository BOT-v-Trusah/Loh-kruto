{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="font-weight-bold text-dark m-0">Мої завдання</h2>
        <a href="{% url 'tasks:task-create' %}" class="btn btn-primary shadow-sm px-4">
            <i class="bi bi-plus-lg"></i> Додати
        </a> 
    </div>


    <div class="card shadow-sm mb-4">
        <div class="card-body py-3">
            <form method="get" class="form-inline">
                <label class="mr-3 font-weight-bold small text-muted text-uppercase">{{ form.status.label }}</label>
                <div class="mr-3">{{ form.status }}</div>
                <button type="submit" class="btn btn-outline-primary btn-sm px-4">Фільтрувати</button>
            </form>
        </div>
    </div>

    <div class="row">
        {% for task in tasks %}
        <div class="col-12 mb-3">
            <div class="card shadow-sm border-left {% if task.priority == 'high' %}border-danger{% else %}border-info{% endif %}" style="border-left-width: 5px !important;">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1">
                            <a href="{% url 'tasks:task-detail' task.pk %}" class="text-dark font-weight-bold text-decoration-none">
                                {{ task.title }}
                            </a>
                        </h5>
                        <span class="badge badge-light border text-primary small">{{ task.status }}</span>
                        <span class="badge {% if task.priority == 'high' %}badge-danger{% else %}badge-secondary{% endif %} small">
                            {{ task.priority }}
                        </span>
                    </div>

                    <div class="d-flex align-items-center">
                        <form action="{% url 'tasks:task-complete' task.pk %}" method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-success btn-sm rounded-pill px-3 shadow-sm">
                                <i class="bi bi-check-lg"></i> Виконано
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5">
            <img src="https://cdn-icons-png.flaticon.com" width="100" class="mb-3 opacity-50">
            <p class="text-muted">Завдань поки немає. Створіть перше!</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
