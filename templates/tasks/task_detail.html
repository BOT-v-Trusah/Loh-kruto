{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

        <a href="{% url 'tasks:task-list' %}" class="btn btn-link text-muted mb-3 p-0">
            <i class="bi bi-arrow-left"></i> Назад до списку
        </a>


        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <h2 class="font-weight-bold text-dark m-0">{{ task.title }}</h2>
                    <span class="badge {% if task.priority == 'high' %}badge-danger{% else %}badge-info{% endif %} px-3 py-2">
                        {{ task.priority|upper }}
                    </span>
                </div>

                <div class="mb-4">
                    <h6 class="text-muted small font-weight-bold text-uppercase">Опис завдання:</h6>
                    <p class="lead text-secondary" style="white-space: pre-wrap;">{{ task.description|default:"Опис відсутній" }}</p>
                </div>

                <hr class="my-4">

                <div class="row align-items-center">
                    <div class="col">
                        <span class="text-muted small d-block mb-1">Статус:</span>
                        <span class="badge badge-primary px-3 py-2">{{ task.status }}</span>
                    </div>
                    <div class="col-auto">
                        <div class="btn-group shadow-sm">
                            <a href="{% url 'tasks:task-update' task.id %}" class="btn btn-warning px-4">
                                <i class="bi bi-pencil"></i> Редагувати
                            </a>
                            <a href="{% url 'tasks:task-delete' task.id %}" class="btn btn-danger px-4">
                                <i class="bi bi-trash"></i> Видалити
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
