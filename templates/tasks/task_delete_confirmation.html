{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 text-center">
            <div class="card-body p-5">

                <div class="display-1 text-danger mb-4">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                
                <h3 class="font-weight-bold text-dark">Ви впевнені?</h3>
                <p class="text-muted mb-4">
                    Ви збираєтеся видалити завдання <br>
                    <strong class="text-dark">"{{ object.title }}"</strong>. <br>
                    Цю дію неможливо буде скасувати.
                </p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-block btn-lg shadow-sm mb-3">
                        <i class="bi bi-trash-fill"></i> Так, видалити
                    </button>
                    <a href="{% url 'tasks:task-list' %}" class="btn btn-light btn-block text-muted">
                        Ні, повернутися до списку
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
