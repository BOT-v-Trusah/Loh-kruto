{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0">
            <div class="card-header bg-white py-3 border-0">
                <h4 class="mb-0 font-weight-bold text-primary text-center">
                    <i class="bi bi-pencil-square mr-2"></i> Оновлення завдання
                </h4>
            </div>
            <div class="card-body px-4 pb-4">
                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="form-group mb-3">
                        <label class="small font-weight-bold text-muted mb-1">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}
                            <div class="text-danger small">{{ error }}</div>
                        {% endfor %}
                    </div>
                    {% endfor %}

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-block shadow-sm py-2 mb-2">
                            <i class="bi bi-arrow-repeat mr-1"></i> Оновити завдання
                        </button>
                        <a href="{% url 'tasks:task-list' %}" class="btn btn-outline-secondary btn-block mt-0 py-2">
                            Назад до списку
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>

    input, select, textarea {
        display: block;
        width: 100%;
        padding: 0.5rem 0.75rem;
        font-size: 1rem;
        border: 1px solid #ced4da;
        border-radius: 8px;
        color: #495057;
    }
    input:focus, select:focus, textarea:focus {
        border-color: #80bdff;
        outline: 0;
        box-shadow: 0 0 0 0.2rem rgba(0,123,255,.25);
    }
    textarea { height: 120px; }
</style>
{% endblock %}
